name: PR Title Lint

# Disabled: all GitHub Actions are currently disabled for this repository
on:
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            chore
            style
            perf
            test
            ci
            build
            revert
            update
