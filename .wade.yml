version: 2
project:
  main_branch: main
  issue_label: feature-plan
  worktrees_dir: ../.worktrees
  branch_prefix: feat
  merge_strategy: PR
ai:
  default_tool: claude
  default_model: claude-sonnet-4.6
  effort: max
  plan:
    tool: claude
    model: claude-opus-4.7
  deps:
    tool: copilot
    model: claude-sonnet-4.6
    mode: headless
  review_plan:
    tool: copilot
    model: claude-sonnet-4.6
    mode: headless
    enabled: true
  review_implementation:
    tool: copilot
    model: claude-sonnet-4.6
    mode: headless
    enabled: true
  review_batch:
    tool: copilot
    model: claude-sonnet-4.6
    mode: interactive
    enabled: true
models:
  claude:
    easy:
      model: claude-sonnet-4.6
    medium:
      model: claude-sonnet-4.6
    complex:
      model: claude-opus-4.7
    very_complex:
      model: claude-opus-4.7
provider:
  name: github
knowledge:
  enabled: true
  path: KNOWLEDGE.md
hooks:
  post_worktree_create: scripts/setup-worktree.sh
  copy_to_worktree:
  - .env
  - .wade.yml
  - KNOWLEDGE.md
  - KNOWLEDGE.ratings.yml
